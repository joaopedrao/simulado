<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prova Online - Sistema Avançado de Avaliação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita seleção de texto, mas não impede totalmente cópia, melhora sensação de prova */
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 20px;
            margin: 0;
        }

        /* Container principal da prova */
        .exam-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.2);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }

        /* Header da prova */
        .exam-header {
            background: #0b2b3b;
            padding: 1.5rem 2rem;
            color: white;
            border-bottom: 4px solid #f39c12;
        }

        .exam-header h1 {
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .exam-header h1::before {
            content: "📝";
            font-size: 2rem;
        }

        .exam-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.9rem;
            background: #1e4a62;
            padding: 8px 16px;
            border-radius: 40px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .student-name-area {
            background: #fef9e6;
            padding: 16px 24px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .name-input {
            flex: 2;
            min-width: 200px;
        }

        .name-input label {
            font-weight: 600;
            color: #0b2b3b;
            display: block;
            margin-bottom: 5px;
        }

        .name-input input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #ccc;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .name-input input:focus {
            border-color: #f39c12;
            box-shadow: 0 0 0 3px rgba(243,156,18,0.2);
        }

        .start-btn {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .start-btn:hover {
            background: #1f5e3a;
            transform: scale(1.02);
        }

        .quiz-area {
            padding: 2rem 2rem 1.8rem;
            background: #ffffff;
        }

        .question-card {
            background: #f9fafc;
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            border: 1px solid #eef2f5;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            color: #1f2f3e;
            margin-bottom: 1.2rem;
            padding-left: 12px;
            border-left: 5px solid #f39c12;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 8px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            transition: all 0.15s;
            cursor: pointer;
        }

        .option:hover {
            background: #fef5e7;
            border-color: #f39c12;
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #f39c12;
            cursor: pointer;
        }

        .option label {
            font-size: 1rem;
            color: #1e2a36;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
        }

        .submit-area {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .finalizar-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .finalizar-btn:disabled {
            background: #b0a790;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .result-area {
            background: #eef2f7;
            margin: 0 2rem 2rem 2rem;
            border-radius: 28px;
            padding: 1.5rem;
            text-align: center;
            font-weight: bold;
            color: #1f3b4a;
            border-top: 2px solid #f39c12;
        }

        .blocked-message {
            background: #e74c3c20;
            border-left: 6px solid #e74c3c;
            padding: 10px;
            margin-top: 15px;
            font-size: 0.85rem;
            border-radius: 12px;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 16px;
            background: #f1f3f7;
            color: #5a6e7c;
        }

        @media (max-width: 680px) {
            .exam-container {
                border-radius: 28px;
            }
            .quiz-area {
                padding: 1rem;
            }
            .question-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="exam-container" id="examContainer">
    <div class="exam-header">
        <h1>Avaliação Técnica</h1>
        <div class="exam-info">
            <span>🔒 Modo Prova: Proibido sair da página</span>
            <span>⏱️ Ao sair, prova é finalizada automaticamente</span>
        </div>
    </div>

    <!-- Seção de identificação (antes de iniciar) -->
    <div id="registrationSection">
        <div class="student-name-area">
            <div class="name-input">
                <label>👤 Seu nome completo (obrigatório)</label>
                <input type="text" id="studentNameInput" placeholder="Ex: Ana Clara Silva" autocomplete="off">
            </div>
            <button class="start-btn" id="startExamBtn">▶ Iniciar Prova</button>
        </div>
    </div>

    <!-- Área da prova (inicialmente escondida) -->
    <div id="quizSection" style="display: none;">
        <div class="quiz-area" id="questionsArea"></div>
        <div class="submit-area">
            <button class="finalizar-btn" id="submitExamBtn">✅ Finalizar Prova</button>
        </div>
        <footer>⚠️ Atenção: qualquer tentativa de sair da página (trocar de aba, fechar, recarregar) resultará na conclusão automática da prova.</footer>
    </div>

    <!-- Área de resultado final após entrega / bloqueio -->
    <div id="resultPanel" style="display: none;" class="result-area"></div>
</div>

<script>
    // ----- Questões de múltipla escolha (simulando uma prova robusta) -----
    const QUESTIONS = [
        {
            text: "Ao acessar o site de uma loja virtual e clicar em Ver detalhes do produto, o navegador faz uma requisição e recebe as informações do produto. O que é um SERVIDOR no contexto do desenvolvimento Back-End?",
            options: ["É o computador físico do usuário que processa as requisições localmente.", "É o arquivo CSS responsável por estilizar as páginas do sistema.", "É um programa ou máquina que fica em execução constante, aguardando requisições.", "É o navegador web (Chrome, Firefox) que interpreta o HTML retornado."],
            correct: 2  // índice 0-based: JavaScript
        },
        {
            text: "Uma empresa de tecnologia está desenvolvendo uma plataforma de vendas online. O time foi dividido entre quem vai cuidar da aparência do site e quem vai cuidar da lógica, dos dados e do servidor. Qual das alternativas define corretamente o conceito de Back-End no desenvolvimento de sistemas?",
            options: ["É a parte visual do sistema, responsável pelo que o usuário vê e interage diretamente no navegador.", "É a camada do sistema que roda no servidor, responsável pela lógica de negócio e comunicação com o banco de dados.", "É exclusivamente o banco de dados onde as informações do sistema são armazenadas.", "É o conjunto de tecnologias que roda no lado do cliente, como HTML, CSS e JavaScript no navegador."],
            correct: 1  // <section>
        },
        {
            text: "Uma equipe de desenvolvimento decidiu usar Node.js para construir o Back-End de uma plataforma de streaming de músicas. Qual das alternativas descreve corretamente o que é o Node.js?",
            options: ["É um ambiente de execução Back-End JavaScript no lado do servidor.", "É um sistema operacional otimizado para servidores web de alta performance.", "É um banco de dados NoSQL baseado em documentos JSON.", "É um framework CSS para construir interfaces responsivas no Back-End."],
            correct: 0  // background-color (melhor resposta)
        },
        {
            text: "Lucas está aprendendo React Native e seu professor recomendou o Expo Go para facilitar o desenvolvimento. O que é o Expo Go e qual sua principal vantagem para desenvolvedores iniciantes?",
            options: ["É um editor de código online que compila React Native direto no navegador.", "É um aplicativo instalado no celular que permite visualizar projetos React Native.", "É um framework CSS que substitui o StyleSheet do React Native.", "É um sistema de versionamento de código integrado ao Android Studio."],
            correct: 1  // //
        },
        {
            text: "As linguagens de programação são frequentemente associadas a símbolos ou mascotes que facilitam sua identificação na informática e entre desenvolvedores. PHP, Python e Java são exemplos de linguagens populares que possuem representações bem conhecidas. Com base nisso, assinale a alternativa correta:",
            options: ["O PHP é representado por uma cobra, o Python por um elefante e o Java por uma engrenagem.", "O PHP é representado por uma xícara de café, o Python por um robô e o Java por uma cobra.", "O PHP é representado por um elefante, o Python por uma cobra e o Java por uma xícara de café."],
            correct: 2  // Document Object Model
        }
    ];

    // Estado da aplicação
    let examActive = false;         // prova ativa (respondendo)
    let examFinished = false;       // prova já finalizada (impede re-submissão)
    let studentName = "";
    let userAnswers = new Array(QUESTIONS.length).fill(null); // armazena o índice da opção selecionada (0..n-1) ou null
    let finalScore = null;
    let pageExitDetected = false;   // flag para evitar dupla finalização

    // Elementos DOM
    const registrationSection = document.getElementById('registrationSection');
    const quizSection = document.getElementById('quizSection');
    const resultPanel = document.getElementById('resultPanel');
    const startBtn = document.getElementById('startExamBtn');
    const studentNameInput = document.getElementById('studentNameInput');
    const questionsArea = document.getElementById('questionsArea');
    const submitExamBtn = document.getElementById('submitExamBtn');

    // ========== FUNÇÕES DE BLOQUEIO E PREVENÇÃO DE SAÍDA ==========
    // Impedir ações que tentam "sair" da página ou voltar/avançar no histórico
    function blockNavigationAndExit() {
        // Previne o clique no botão voltar do navegador (pushState)
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function (event) {
            if (examActive && !examFinished) {
                // Se tentar voltar/avançar, registra saida forçada
                if (!pageExitDetected) {
                    forceExitAndComplete("🚨 Navegação bloqueada: tentativa de voltar/avançar página. Prova finalizada.");
                }
                // Mantém a página atual impedindo a navegação real
                history.pushState(null, null, location.href);
            } else {
                // Se prova já acabou, permite popstate (mas ainda mantém restrição se quiser)
                if (!examFinished) history.pushState(null, null, location.href);
            }
        });

        // Bloqueia recarregamento com mensagem customizada (beforeunload)
        window.addEventListener('beforeunload', function (e) {
            if (examActive && !examFinished) {
                // Mensagem padrão do navegador
                const message = "A prova está em andamento! Se você sair ou recarregar, sua prova será automaticamente finalizada e registrada. Deseja realmente sair?";
                e.preventDefault();
                e.returnValue = message;
                return message;
            }
        });

        // Detecta perda de foco / ocultação da página (visibilitychange) - quando troca de aba ou minimiza
        document.addEventListener('visibilitychange', function () {
            if (examActive && !examFinished && !pageExitDetected) {
                if (document.hidden) {
                    // Usuário saiu da aba / tela
                    forceExitAndComplete("🚨 Saída da aba/tela detectada! Prova finalizada automaticamente.");
                }
            }
        });

        // Bloqueia teclas de atalho comuns: F5, Ctrl+R, Ctrl+Shift+R, Alt+Left, Ctrl+Left, etc.
        window.addEventListener('keydown', function (e) {
            if (examActive && !examFinished) {
                // Previne F5, Ctrl+R, Ctrl+Shift+R
                if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.ctrlKey && e.shiftKey && e.key === 'R')) {
                    e.preventDefault();
                    forceExitAndComplete("🚨 Tecla de recarregamento pressionada. Prova finalizada.");
                    return false;
                }
                // Previne Alt+Left / Alt+Right (navegação)
                if (e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                    e.preventDefault();
                    forceExitAndComplete("🚨 Tentativa de navegação via teclas Alt. Prova finalizada.");
                    return false;
                }
                // Previne Ctrl+W (fechar aba)
                if (e.ctrlKey && e.key === 'w') {
                    e.preventDefault();
                    forceExitAndComplete("🚨 Tentativa de fechar aba. Prova finalizada.");
                    return false;
                }
            }
        });

        // Previne clique direito (opcional, apenas para consistência)
        window.addEventListener('contextmenu', function(e) {
            if (examActive && !examFinished) {
                e.preventDefault();
                return false;
            }
        });
    }

    // Força a conclusão da prova devido à violação de saída
    function forceExitAndComplete(reason) {
        if (!examActive || examFinished || pageExitDetected) return;
        pageExitDetected = true;

        // Coleta respostas atuais (o que o usuário respondeu até o momento)
        const currentAnswers = collectCurrentAnswersFromDOM();
        for (let i = 0; i < QUESTIONS.length; i++) {
            if (currentAnswers[i] !== undefined && currentAnswers[i] !== null) {
                userAnswers[i] = currentAnswers[i];
            }
        }

        // Calcula pontuação
        let scoreCount = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === QUESTIONS[i].correct) {
                scoreCount++;
            }
        }
        finalScore = scoreCount;
        const total = QUESTIONS.length;
        const finalMessage = `⚠️ PROVA FINALIZADA POR SAÍDA NÃO AUTORIZADA ⚠️<br><strong>Estudante:</strong> ${escapeHtml(studentName)}<br><strong>Motivo:</strong> ${reason}<br><strong>Resultado:</strong> ${finalScore} de ${total} acertos (${Math.round((finalScore/total)*100)}%)<br><br>📌 Prova concluída automaticamente. Não é possível retornar.`;

        // Desativa flags
        examActive = false;
        examFinished = true;
        
        // Esconde área de questões e botão finalizar
        quizSection.style.display = 'none';
        registrationSection.style.display = 'none';
        resultPanel.style.display = 'block';
        resultPanel.innerHTML = finalMessage;
        resultPanel.classList.add('blocked-message');
        resultPanel.style.background = "#fce4e4";
        resultPanel.style.borderLeft = "6px solid #c0392b";

        // Limpa qualquer listener de prevenção extra (mas não necessário)
        // Registrar no console (simulando log)
        console.log(`Prova forçada finalizada para ${studentName}. Motivo: ${reason}. Nota: ${finalScore}/${total}`);
    }

    // Coleta respostas atuais do DOM (apenas para captura em caso de saida)
    function collectCurrentAnswersFromDOM() {
        const currentSelections = new Array(QUESTIONS.length).fill(null);
        for (let i = 0; i < QUESTIONS.length; i++) {
            const selectedRadio = document.querySelector(`input[name="q${i}"]:checked`);
            if (selectedRadio) {
                const val = parseInt(selectedRadio.value);
                if (!isNaN(val)) currentSelections[i] = val;
            }
        }
        return currentSelections;
    }

    // Finalização voluntária pelo botão "Finalizar Prova"
    function voluntarySubmit() {
        if (!examActive || examFinished) return;
        
        // Coleta respostas finais
        for (let i = 0; i < QUESTIONS.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected) {
                userAnswers[i] = parseInt(selected.value);
            } else {
                userAnswers[i] = null;
            }
        }
        
        let correctCount = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === QUESTIONS[i].correct) {
                correctCount++;
            }
        }
        finalScore = correctCount;
        const total = QUESTIONS.length;
        const resultText = `✅ PROVA FINALIZADA COM SUCESSO ✅<br><strong>Estudante:</strong> ${escapeHtml(studentName)}<br><strong>Acertos:</strong> ${finalScore} de ${total} (${Math.round((finalScore/total)*100)}%)<br><br>📋 Respostas registradas. Obrigado por realizar a avaliação!`;
        
        examActive = false;
        examFinished = true;
        
        // Esconde a prova e mostra resultado
        quizSection.style.display = 'none';
        registrationSection.style.display = 'none';
        resultPanel.style.display = 'block';
        resultPanel.innerHTML = resultText;
        resultPanel.style.background = "#dff0e0";
        resultPanel.style.borderLeft = "6px solid #2c7a4d";
    }
    
    // Renderiza todas as questões na tela
    function renderQuestions() {
        if (!questionsArea) return;
        let html = '';
        QUESTIONS.forEach((q, idx) => {
            const selectedVal = userAnswers[idx];
            html += `
                <div class="question-card">
                    <div class="question-text">${idx+1}. ${escapeHtml(q.text)}</div>
                    <div class="options">
            `;
            q.options.forEach((opt, optIdx) => {
                const isChecked = (selectedVal === optIdx);
                html += `
                    <div class="option" data-qidx="${idx}" data-oidx="${optIdx}">
                        <input type="radio" name="q${idx}" id="q${idx}_opt${optIdx}" value="${optIdx}" ${isChecked ? 'checked' : ''}>
                        <label for="q${idx}_opt${optIdx}">${String.fromCharCode(65+optIdx)}. ${escapeHtml(opt)}</label>
                    </div>
                `;
            });
            html += `</div></div>`;
        });
        questionsArea.innerHTML = html;
        
        // Adicionar eventos de clique nos cards para facilitar marcação
        document.querySelectorAll('.option').forEach(optionDiv => {
            const radio = optionDiv.querySelector('input[type="radio"]');
            if (radio) {
                optionDiv.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        radio.checked = true;
                        // disparar evento change para salvar estado (não necessário salvar separadamente pois userAnswers será lido depois)
                        const changeEvent = new Event('change', { bubbles: true });
                        radio.dispatchEvent(changeEvent);
                    }
                });
            }
        });
        
        // Atualiza array userAnswers sempre que marcar/desmarcar
        for (let i = 0; i < QUESTIONS.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (examActive && !examFinished) {
                        const val = parseInt(e.target.value);
                        userAnswers[i] = val;
                    }
                });
            });
        }
    }
    
    // Função de iniciar a prova (valida nome)
    function startExam() {
        const nameInputValue = studentNameInput.value.trim();
        if (nameInputValue === "") {
            alert("Por favor, digite seu nome completo para iniciar a prova.");
            return;
        }
        studentName = nameInputValue;
        
        // Resetar estados
        examActive = true;
        examFinished = false;
        pageExitDetected = false;
        userAnswers = new Array(QUESTIONS.length).fill(null);
        finalScore = null;
        
        // Esconde registro e exibe quiz
        registrationSection.style.display = 'none';
        quizSection.style.display = 'block';
        resultPanel.style.display = 'none';
        
        // Renderiza questões
        renderQuestions();
        
        // Aplica sistema de bloqueio completo
        blockNavigationAndExit();
        
        // Adiciona prevenção adicional para 'contextmenu' já incluso na blockNavigation...
        // Bloqueio de copy + cut (opcional)
        document.body.style.pointerEvents = 'auto';
        
        // Mensagem de confirmação no console
        console.log(`Prova iniciada para: ${studentName}. Modo bloqueio ativo.`);
    }
    
    // Finalização voluntária via botão
    submitExamBtn.addEventListener('click', () => {
        if (examActive && !examFinished) {
            // Confirmação amigável
            const confirmSubmit = confirm("Tem certeza que deseja finalizar a prova? Você não poderá alterar as respostas depois.");
            if (confirmSubmit) {
                voluntarySubmit();
            }
        }
    });
    
    startBtn.addEventListener('click', startExam);
    
    // Prevenir qualquer tentativa de colar ou copiar durante a prova (sensação adicional)
    document.addEventListener('copy', function(e) {
        if (examActive && !examFinished) {
            e.preventDefault();
            // opcional, apenas bloqueia
            return false;
        }
    });
    document.addEventListener('cut', function(e) {
        if (examActive && !examFinished) {
            e.preventDefault();
            return false;
        }
    });
    document.addEventListener('paste', function(e) {
        if (examActive && !examFinished) {
            e.preventDefault();
            return false;
        }
    });
    
    // Função auxiliar para escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // Inicialmente nenhum bloqueio ativo, mas impedimos recarregamento sem prova ativa? apenas quando iniciar.
    // Prevenir recarregamento sem prova ativa não é necessário, mas se a prova não começou, sem problemas.
    // Também ao carregar a página, garantir que o estado histórico seja manipulado quando prova iniciar.
    // Para não conflitar, inicialmente não ativa popstate até start.
    window.addEventListener('load', () => {
        // Pequeno detalhe: se a página tentar recarregar sem prova, sem mensagem
        // tudo ok.
        // Garantir que se o usuário clicar em voltar antes de iniciar, não atrapalha.
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function() {
            if (!examActive && !examFinished) {
                // só manter na mesma página sem afetar experiência
                history.pushState(null, null, location.href);
            }
        });
    });
</script>
</body>
</html>
